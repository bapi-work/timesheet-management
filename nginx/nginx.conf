events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:4000;
  }

  upstream frontend {
    server frontend:80;
  }

  # ISO 27001 A.13.2 / A.8.2: Security headers applied to all responses
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

  # HTTP → HTTPS redirect (production with SSL termination)
  server {
    listen 80;
    server_name _;

    # Health check bypass (used by container orchestrators)
    location /api/health {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }

    # Redirect all HTTP to HTTPS in production (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }

    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # HTTPS server block (production — requires SSL certificate)
  # Uncomment and configure for production deployment:
  #
  # server {
  #   listen 443 ssl http2;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 1d;
  #   ssl_stapling        on;
  #   ssl_stapling_verify on;
  #
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  #
  #   client_max_body_size 20M;
  #
  #   location /api/ {
  #     proxy_pass http://backend;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection 'upgrade';
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto https;
  #     proxy_cache_bypass $http_upgrade;
  #   }
  #
  #   location /socket.io/ {
  #     proxy_pass http://backend;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection "upgrade";
  #     proxy_set_header Host $host;
  #   }
  #
  #   location / {
  #     proxy_pass http://frontend;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Forwarded-Proto https;
  #   }
  # }
}
