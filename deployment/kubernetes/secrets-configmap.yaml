apiVersion: v1
kind: ConfigMap
metadata:
  name: timesheet-config
  namespace: timesheet
data:
  NODE_ENV: "production"
  PORT: "4000"
  FRONTEND_URL: "https://timesheet.yourdomain.com"
  VITE_API_URL: "https://timesheet.yourdomain.com/api"
  VITE_WS_URL: "wss://timesheet.yourdomain.com"
  LOG_LEVEL: "info"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USER: "apikey"
  SMTP_FROM: "noreply@timesheet.yourdomain.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: timesheet-secrets
  namespace: timesheet
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret-min-32-chars-change-this"
  JWT_REFRESH_SECRET: "your-jwt-refresh-secret-min-32-chars-change-this"
  SMTP_PASS: "your-sendgrid-api-key"
  DATABASE_URL: "postgresql://user:password@db-host:5432/timesheet_db"
  REDIS_URL: "redis://:password@redis-host:6379"
  AWS_ACCESS_KEY_ID: "your-aws-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret"
