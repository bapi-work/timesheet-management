apiVersion: apps/v1
kind: Deployment
metadata:
  name: timesheet-backend
  namespace: timesheet
  labels:
    app: timesheet-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: timesheet-backend
  template:
    metadata:
      labels:
        app: timesheet-backend
    spec:
      serviceAccountName: timesheet-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: backend
        image: your-registry.azurecr.io/timesheet-backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: PORT
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: FRONTEND_URL
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: VITE_API_URL
        - name: VITE_WS_URL
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: VITE_WS_URL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: LOG_LEVEL
        - name: JWT_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: JWT_EXPIRES_IN
        - name: JWT_REFRESH_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: JWT_REFRESH_EXPIRES_IN
        - name: SMTP_HOST
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: SMTP_USER
        - name: SMTP_FROM
          valueFrom:
            configMapKeyRef:
              name: timesheet-config
              key: SMTP_FROM
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: JWT_REFRESH_SECRET
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: SMTP_PASS
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: REDIS_URL
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: timesheet-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: S3_BUCKET_NAME
          value: "timesheet-uploads-prod"
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
        
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: timesheet-uploads-pvc
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: timesheet-backend
  namespace: timesheet
  labels:
    app: timesheet-backend
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: timesheet-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: timesheet-backend-hpa
  namespace: timesheet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: timesheet-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: timesheet-backend
  namespace: timesheet

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: timesheet-backend-pdb
  namespace: timesheet
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: timesheet-backend
