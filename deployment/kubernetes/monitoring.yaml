apiVersion: v1
kind: ServiceMonitor
metadata:
  name: timesheet-backend
  namespace: timesheet
spec:
  selector:
    matchLabels:
      app: timesheet-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

---
apiVersion: v1
kind: PrometheusRule
metadata:
  name: timesheet-alerts
  namespace: timesheet
spec:
  groups:
  - name: timesheet.rules
    interval: 30s
    rules:
    - alert: HighErrorRate
      expr: |
        rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is above 5% for the last 5 minutes"
    
    - alert: HighResponseTime
      expr: |
        histogram_quantile(0.99, http_request_duration_seconds_bucket) > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High response time"
        description: "P99 response time is above 5 seconds"
    
    - alert: DatabaseConnectionPool
      expr: |
        timesheet_db_connections_used / timesheet_db_connections_max > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database connection pool near capacity"
        description: "Using more than 80% of available connections"
    
    - alert: PodMemoryUsage
      expr: |
        container_memory_usage_bytes{pod=~"timesheet-.*"} / container_spec_memory_limit_bytes > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod memory usage high"
        description: "Memory usage is above 85% of limit"

---
apiVersion: v1
kind: PodMonitor
metadata:
  name: timesheet-backend
  namespace: timesheet
spec:
  selector:
    matchLabels:
      app: timesheet-backend
  podMetricsEndpoints:
  - port: http
    path: /metrics
    interval: 30s
